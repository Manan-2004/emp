<div class="card shadow-sm">

    <div class="card-header d-flex justify-content-between align-items-center">

        <h4>
            Employees
        </h4>

        <button class="btn btn-primary" (click)="addemployee()">

            Add Employee

        </button>

    </div>

    <div class="card-body">

        <table class="table table-hover">

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Name</th>

                    <th>Email</th>

                    <th>Department</th>

                    <th>Designation</th>

                    <th>Status</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody>

                @for(emp of employees(); track emp.id){

                <tr>

                    <td>{{emp.id}}</td>

                    <td>

                        {{emp.firstName}}
                        {{emp.lastName}}

                    </td>

                    <td>{{emp.email}}</td>

                    <td>{{emp.department}}</td>

                    <td>{{emp.designation}}</td>

                    <td>

                        <span class="badge bg-success">

                            {{emp.status}}

                        </span>

                    </td>

                    <td>

                        <button class="btn btn-sm btn-info me-2" (click)="viewemployee(emp.id)">

                            View

                        </button>

                        <button class="btn btn-sm btn-warning me-2" (click)="editemployee(emp.id)">

                            Edit

                        </button>

                        <button class="btn btn-sm btn-danger" (click)="deleteEmployee(emp.id)">

                            Delete

                        </button>

                    </td>

                </tr>

                }

            </tbody>

        </table>

    </div>

</div>
