<div class="card shadow">

    <div class="card-header">

        <h3>Employee Details</h3>

    </div>

    <div class="card-body">

        <p>
            <strong>Name:</strong>
            {{employee()?.firstName}}
            {{employee()?.lastName}}
        </p>

        <p>
            <strong>Email:</strong>
            {{employee()?.email}}
        </p>

        <p>
            <strong>Department:</strong>
            {{employee()?.department}}
        </p>

        <p>
            <strong>Designation:</strong>
            {{employee()?.designation}}
        </p>

        <p>
            <strong>Salary:</strong>
            ₹{{employee()?.salary}}
        </p>

    </div>

</div>
