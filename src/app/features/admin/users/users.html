<div class="card shadow-sm">

    <div class="card-header">

        <h4>

            Users Management

        </h4>

    </div>

    <div class="card-body">

        <div class="row mb-3">

            <div class="col-md-6">

                <input
                    type="text"
                    class="form-control"
                    placeholder="Search User"
                    (input)="onSearch($event)">

            </div>

            <div class="col-md-3">

                <select
                    class="form-select"
                    (change)="onRoleChange($event)">

                    <option value="">

                        All Roles

                    </option>

                    <option value="admin">

                        Admin

                    </option>

                    <option value="user">

                        User

                    </option>

                </select>

            </div>

        </div>

        @if(loading()){

        <div class="text-center p-5">

            <div
              class="spinner-border">
            </div>

        </div>

        }
        @else{

        <table class="table table-hover">

            <thead>

                <tr>

                    <th>Username</th>

                    <th>Name</th>

                    <th>Email</th>

                    <th>Role</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody>

                @for(user of filteredUsers(); track user.id){

                <tr>

                    <td>

                        {{user.username}}

                    </td>

                    <td>

                        {{user.name}}

                    </td>

                    <td>

                        {{user.email}}

                    </td>

                    <td>

                        <span
                         class="badge bg-primary">

                            {{user.role}}

                        </span>

                    </td>

                    <td>

                        <button
                          class="btn btn-warning btn-sm me-2"
                          (click)="resetPassword(user)">

                          Reset Password

                        </button>

                        @if(user.username !== 'admin'){

                        <button
                          class="btn btn-danger btn-sm"
                          (click)="deleteUser(user)">

                          Delete

                        </button>

                        }

                    </td>

                </tr>

                }

            </tbody>

        </table>

        }

    </div>

</div>
